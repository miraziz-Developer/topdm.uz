services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: bozor_ai
      POSTGRES_USER: bozor
      POSTGRES_PASSWORD: bozor
    ports:
      - "5432:5432"
    volumes:
      - bozor_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bozor -d bozor_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - bozor_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: bozor_ai
      POSTGRES_USER: bozor
      POSTGRES_PASSWORD: bozor
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://bozor:bozor@postgres:5432/bozor_ai
      ENABLE_ONLINE_CHECKOUT: ${ENABLE_ONLINE_CHECKOUT:-true}
      PAYMENT_CHECKOUT_BASE_URL: ${PAYMENT_CHECKOUT_BASE_URL:-http://localhost:3002}
      TDB_CLICK_P2P_CARD_NUMBER: ${TDB_CLICK_P2P_CARD_NUMBER:-8600999999999999}
      TDB_BTS_API_MOCK: ${TDB_BTS_API_MOCK:-true}
      TDB_P2P_PROVIDER_MOCK: ${TDB_P2P_PROVIDER_MOCK:-true}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/uploads:/app/uploads
      - ./scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: bozor_ai
      POSTGRES_USER: bozor
      POSTGRES_PASSWORD: bozor
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://bozor:bozor@postgres:5432/bozor_ai
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend/app:/app/app
    entrypoint: []
    command:
      [
        "celery",
        "-A",
        "app.infrastructure.tasks.celery_app.celery_app",
        "worker",
        "-l",
        "info",
        "-Q",
        "celery",
      ]
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["tdb"]

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: bozor_ai
      POSTGRES_USER: bozor
      POSTGRES_PASSWORD: bozor
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://bozor:bozor@postgres:5432/bozor_ai
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend/app:/app/app
    entrypoint: []
    command:
      [
        "celery",
        "-A",
        "app.infrastructure.tasks.celery_app.celery_app",
        "beat",
        "-l",
        "info",
      ]
    depends_on:
      celery-worker:
        condition: service_started
    restart: unless-stopped
    profiles: ["tdb"]

  merchant-bot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: bozor_ai
      POSTGRES_USER: bozor
      POSTGRES_PASSWORD: bozor
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://bozor:bozor@postgres:5432/bozor_ai
      PYTHONPATH: /app
    volumes:
      - ./backend/app:/app/app
      - ./scripts:/app/scripts
    entrypoint: []
    command: ["python", "/app/scripts/run_merchant_bot.py"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import pathlib; s=pathlib.Path('/proc/1/cmdline').read_bytes().decode('latin1','replace'); exit(0 if 'run_merchant_bot' in s else 1)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  merchant-crm:
    build:
      context: ./merchant-crm
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./merchant-crm:/app
      - merchant_crm_node_modules:/app/node_modules
      - merchant_crm_next:/app/.next
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      BACKEND_API_URL: http://backend:8000
      NEXT_PUBLIC_BACKEND_ORIGIN: http://localhost:8000
      NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${NEXT_PUBLIC_YANDEX_MAPS_API_KEY:-}
      WATCHPACK_POLLING: "true"
    ports:
      - "${MERCHANT_CRM_PORT:-3003}:3000"
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      BACKEND_API_URL: http://backend:8000
      NEXT_PUBLIC_BACKEND_ORIGIN: http://localhost:8000
      NEXT_PUBLIC_MAPTILER_KEY: ${NEXT_PUBLIC_MAPTILER_KEY:-}
      NEXT_PUBLIC_MAP_PROVIDER: ${NEXT_PUBLIC_MAP_PROVIDER:-yandex-maps-api}
      NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${NEXT_PUBLIC_YANDEX_MAPS_API_KEY:-}
      YANDEX_ROUTER_API_KEY: ${YANDEX_ROUTER_API_KEY:-${NEXT_PUBLIC_YANDEX_MAPS_API_KEY:-}}
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_ENABLE_ONLINE_CHECKOUT: ${NEXT_PUBLIC_ENABLE_ONLINE_CHECKOUT:-true}
      NEXT_PUBLIC_ENABLE_CHINA_MARKET: ${NEXT_PUBLIC_ENABLE_CHINA_MARKET:-false}
    ports:
      - "${FRONTEND_PORT:-3002}:3000"
    volumes:
      # Full tree mount — avoids macOS Docker turning package.json into a directory.
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      # .next alohida — host (macOS) va konteyner keshi aralashmasin (500 / manifest xato).
      - frontend_next:/app/.next
    command: >-
      sh -c "npm install --prefer-offline --no-audit --no-fund
      && npm run dev -- --hostname 0.0.0.0 --port 3000"
    depends_on:
      backend:
        condition: service_healthy

  # Local S3 dev (ixtiyoriy): docker compose --profile s3dev up -d minio minio-init
  minio:
    image: minio/minio:latest
    profiles: ["s3dev"]
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    profiles: ["s3dev"]
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 2;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/bozorliii-media 2>/dev/null || true;
      mc anonymous set download local/bozorliii-media 2>/dev/null || true;
      echo minio bucket ready;
      "

volumes:
  bozor_pg:
  bozor_redis:
  minio_data:
  frontend_node_modules:
  frontend_next:
  merchant_crm_node_modules:
  merchant_crm_next:
