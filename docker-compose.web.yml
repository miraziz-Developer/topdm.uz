# Bozorliii WEB — Server 1 (4GB), yengil edge
#
#   cp .env.web.example .env
#   bash deploy/setup-swap.sh 2
#   bash deploy/sysctl-split-tune.sh
#   docker compose -f docker-compose.web.yml up -d --build

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
        NEXT_PUBLIC_BACKEND_ORIGIN: ${NEXT_PUBLIC_BACKEND_ORIGIN:-https://api.bozorliii.online}
        NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME:-}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://bozorliii.online}
        NEXT_PUBLIC_MERCHANT_CRM_URL: ${NEXT_PUBLIC_MERCHANT_CRM_URL:-https://crm.bozorliii.online}
        NEXT_PUBLIC_ENABLE_ONLINE_CHECKOUT: ${NEXT_PUBLIC_ENABLE_ONLINE_CHECKOUT:-false}
        NEXT_PUBLIC_DEMO_FAKE_DATA: "false"
        NEXT_PUBLIC_ALLOW_DEV_MOCKS: "false"
        NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${NEXT_PUBLIC_YANDEX_MAPS_API_KEY:-}
        NEXT_PUBLIC_MEDIA_CDN_URL: ${NEXT_PUBLIC_MEDIA_CDN_URL:-}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=460}
      BACKEND_API_URL: ${BACKEND_API_URL:?Set BACKEND_API_URL to core server http://PRIVATE_IP:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
      NEXT_PUBLIC_BACKEND_ORIGIN: ${NEXT_PUBLIC_BACKEND_ORIGIN:-https://api.bozorliii.online}
    mem_limit: 520m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000',(r)=>{r.resume();process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))\"",
        ]
      interval: 45s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - frontend-network

  merchant-crm:
    build:
      context: ./merchant-crm
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
        NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME:-}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://bozorliii.online}
        NEXT_PUBLIC_MAP_PROVIDER: ${NEXT_PUBLIC_MAP_PROVIDER:-yandex-maps-api}
        NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${NEXT_PUBLIC_YANDEX_MAPS_API_KEY:-}
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=460}
      BACKEND_API_URL: ${BACKEND_API_URL:?Set BACKEND_API_URL}
      NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${NEXT_PUBLIC_YANDEX_MAPS_API_KEY:-}
      YANDEX_MAPS_API_KEY: ${NEXT_PUBLIC_YANDEX_MAPS_API_KEY:-}
      NEXT_PUBLIC_MAP_PROVIDER: ${NEXT_PUBLIC_MAP_PROVIDER:-yandex-maps-api}
    mem_limit: 520m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000',(r)=>{r.resume();process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))\"",
        ]
      interval: 45s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - frontend-network

  platform-admin:
    build:
      context: ./platform-admin
      dockerfile: Dockerfile
      target: runner
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=460}
      BACKEND_API_URL: ${BACKEND_API_URL:?Set BACKEND_API_URL}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?Set ADMIN_API_KEY}
      ADMIN_PANEL_USERNAME: ${ADMIN_PANEL_USERNAME:-admin}
      ADMIN_PANEL_PASSWORD: ${ADMIN_PANEL_PASSWORD:?Set ADMIN_PANEL_PASSWORD}
      ADMIN_PANEL_SECRET: ${ADMIN_PANEL_SECRET:-}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://bozorliii.online}
    mem_limit: 520m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000',(r)=>{r.resume();process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))\"",
        ]
      interval: 45s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - frontend-network

  nginx:
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile.web
    restart: always
    environment:
      CORE_BACKEND_HOST: ${CORE_BACKEND_HOST:?Set CORE_BACKEND_HOST to core private IP}
      NGINX_WORKER_PROCESSES: ${NGINX_WORKER_PROCESSES:-2}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
      - nginx_media_cache:/var/cache/nginx
    mem_limit: 256m
    depends_on:
      frontend:
        condition: service_healthy
      merchant-crm:
        condition: service_healthy
      platform-admin:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsSk https://127.0.0.1/health -H 'Host: bozorliii.online' >/dev/null 2>&1 || exit 1",
        ]
      interval: 45s
      timeout: 5s
      retries: 3
    networks:
      - frontend-network

networks:
  frontend-network:
    driver: bridge

volumes:
  nginx_logs:
  nginx_media_cache:
