services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: bozor_ai
      POSTGRES_USER: bozor
      POSTGRES_PASSWORD: bozor
    ports:
      - "5432:5432"
    volumes:
      - bozor_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bozor -d bozor_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - bozor_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: bozor_ai
      POSTGRES_USER: bozor
      POSTGRES_PASSWORD: bozor
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://bozor:bozor@postgres:5432/bozor_ai
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    command: sh -c "if [ ! -d node_modules ]; then npm install; fi && npm run dev -- --hostname 0.0.0.0 --port 3000"
    depends_on:
      - backend

volumes:
  bozor_pg:
  bozor_redis:
