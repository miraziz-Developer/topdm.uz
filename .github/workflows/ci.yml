name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: /api/v1
          NEXT_PUBLIC_SITE_URL: https://bozorliii.online
          BACKEND_API_URL: http://127.0.0.1:8000

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: /api/v1
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      - run: npm run test:e2e
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pip install pip-audit
      - run: pip-audit --strict --desc on 2>/dev/null || pip-audit || true
      - run: python -c "from app.main import app; assert app is not None"
      - run: pytest -q

  backend-migrations:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: bozor_test
          POSTGRES_USER: bozor
          POSTGRES_PASSWORD: bozor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bozor -d bozor_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: alembic -c alembic.ini upgrade head
        env:
          DATABASE_URL: postgresql://bozor:bozor_test@localhost:5432/bozor_test

  backend-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest -q tests/test_click_verify.py tests/test_upload_validation.py tests/test_order_expiry_task.py
        env:
          REDIS_URL: redis://localhost:6379/0

  merchant-crm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: merchant-crm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: merchant-crm/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: /api/v1
          NEXT_PUBLIC_SITE_URL: https://bozorliii.online

  docker-prod-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.production.example .env
      - run: |
          sed -i 's/CHANGE_ME_STRONG_DB_PASSWORD/testpassword/g' .env
          sed -i 's/CHANGE_ME_USE_openssl_rand_hex_32/ci-test-jwt-secret-32chars-min/g' .env
          sed -i 's/CHANGE_ME_ADMIN_KEY/ci-admin-key/g' .env
      - run: docker compose -f docker-compose.prod.yml build backend celery-worker celery-beat frontend merchant-crm
        env:
          POSTGRES_PASSWORD: testpassword
          JWT_SECRET: ci-test-jwt-secret-32chars-min
          ADMIN_API_KEY: ci-admin-key
          GROQ_API_KEY: sk-ci-placeholder
          TELEGRAM_BOT_TOKEN: "123456:ABC-DEF"
          GOOGLE_API_KEY: ci-google-key
          OPENAI_API_KEY: ci-openai-key
