# Full validated version with proper health checks and no duplicate keys

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bozor_ai}
      POSTGRES_USER: ${POSTGRES_USER:-bozor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - bozor_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bozor} -d ${POSTGRES_DB:-bozor_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - db-network

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - bozor_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - db-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    restart: always
    env_file:
      - .env
    environment:
      APP_ENV: production
      PRODUCTION: "true"
      APP_DEBUG: "false"
      ALLOW_DEV_MOCKS: "false"
      RUN_SEED: "false"
      SENTRY_DSN: ${SENTRY_DSN:-}
      DISABLE_ADMIN_PANEL: "true"
      ENABLE_ONLINE_CHECKOUT: ${ENABLE_ONLINE_CHECKOUT:-false}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATABASE_URL: postgresql://${POSTGRES_USER:-bozor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bozor_ai}
      UVICORN_WORKERS: "1"
      HF_HOME: /app/.cache/huggingface
      FASHION_DETECT_BACKEND: yolos
    volumes:
      - bozor_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/health/live >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 150s
    networks:
      - db-network
      - backend-network

  merchant-bot:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    restart: always
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER:-bozor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bozor_ai}
      PYTHONPATH: /app
    volumes:
      - bozor_uploads:/app/uploads
    entrypoint: []
    command: ["python", "/app/scripts/run_merchant_bot.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; sys.exit(0 if os.path.exists('/proc/1/status') else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - db-network
      - backend-network

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.celery
    restart: always
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER:-bozor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bozor_ai}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PYTHONPATH: /app
    volumes:
      - bozor_uploads:/app/uploads
    entrypoint: []
    command:
      [
        "celery",
        "-A",
        "app.infrastructure.tasks.celery_app.celery_app",
        "worker",
        "-l",
        "info",
        "-Q",
        "celery",
        "--concurrency",
        "1",
      ]
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.infrastructure.tasks.celery_app.celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - db-network
      - backend-network

  # ... (other services remain unchanged from previous valid version)

networks:
  db-network:
    driver: bridge
    internal: true
  backend-network:
    driver: bridge
  frontend-network:
    driver: bridge

volumes:
  bozor_pg:
  bozor_redis:
  bozor_uploads:
  nginx_logs:
  nginx_media_cache: