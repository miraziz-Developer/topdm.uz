services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bozor-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bozor_ai
      POSTGRES_USER: bozor
      POSTGRES_PASSWORD: bozor
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bozor-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
